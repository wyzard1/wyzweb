<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Learn more about Wyzard - A tech enthusiast from Bosnia and Herzegovina">
    <title>Wyzard | About Me</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
    <style>
        @font-face {
            font-family: SAIBA-45;
            src: url('SAIBA-45-Regular-(v1.1).ttf');
        }
    </style>
</head>

<body>
    <div class="upper">
        <a href="index.html">← Back</a>
        <header class="header"><span class="auto-type"></span></header>
        <hr class="separator">
    </div>

    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed(".auto-type", {
            strings: ["ABOUT ME"],
            typeSpeed: 120,
            loop: false,
            showCursor: true,
            cursorChar: '_'
        });
    </script>

    <div class="MainContainer">
        <img class="mandelbrot" src="mandelbrot.png" alt="Profile Image">

        <div class="textboxaboutme">
            <h2>Greetings!</h2>
            <p><span class="auto-type-aboutme"></span></p>
            <script>
                var typed2 = new Typed(".auto-type-aboutme", {
                    strings: ["My real name is Dino Osmanovic. Wyzard is just a nickname I gave myself so I don't have to use my real name on the internet.\n\nBy the time of writing this I'm 17 years old. I was born and live in a small town called Tuzla, Bosnia and Herzegovina.\n\nMy interests are music and tech. I created this site myself to learn a bit of web dev. I am fond of continuing my tech journey and that's why I'll probably post my personal projects here.\n\nI am also a fan of videogames. My favourites are Minecraft, Apex Legends, Portal and Unturned.\n\nHit me up on Discord if you wanna do some gaming or do a project together!\n\n— Sincerely, Dino"],
                    typeSpeed: 5,
                    loop: false,
                    showCursor: true,
                    cursorChar: '|'
                });
            </script>
        </div>

        <div class="textboxpcspecs">
            <h2>Tech Stack</h2>
            <p>HTML</p>
            <p>CSS</p>
            <p>JAVA</p>
            <p>TYPESCRIPT</p>
            <p>SPRING BOOT</p>
            <p>NEXT.js</p>
            <p>GIT</p>
            <p>DOCKER</p>
        </div>
    </div>
</body>

</html>
